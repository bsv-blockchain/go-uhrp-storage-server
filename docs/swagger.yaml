basePath: /
definitions:
  handlers.findData:
    properties:
      expiryTime:
        type: integer
      mimeType:
        type: string
      name:
        type: string
      size:
        type: string
    type: object
  handlers.findResponse:
    properties:
      code:
        type: string
      data:
        $ref: '#/definitions/handlers.findData'
      description:
        type: string
      status:
        type: string
    type: object
  handlers.listResponse:
    properties:
      code:
        type: string
      description:
        type: string
      status:
        type: string
      uploads:
        items:
          $ref: '#/definitions/handlers.listUpload'
        type: array
    type: object
  handlers.listUpload:
    properties:
      expiryTime:
        type: integer
      uhrpUrl:
        type: string
    type: object
  handlers.quoteRequest:
    properties:
      fileSize:
        example: 1024
        type: integer
      retentionPeriod:
        example: 60
        type: integer
    type: object
  handlers.quoteResponse:
    properties:
      quote:
        type: integer
    type: object
  handlers.renewRequest:
    properties:
      additionalMinutes:
        type: integer
      limit:
        type: integer
      offset:
        type: integer
      uhrpUrl:
        type: string
    type: object
  handlers.renewResponse:
    properties:
      amount:
        type: integer
      code:
        type: string
      description:
        type: string
      newExpiryTime:
        type: integer
      prevExpiryTime:
        type: integer
      status:
        type: string
    type: object
  handlers.uploadRequest:
    properties:
      fileSize:
        type: integer
      retentionPeriod:
        type: integer
    type: object
  handlers.uploadResponse:
    properties:
      amount:
        type: integer
      code:
        type: string
      description:
        type: string
      requiredHeaders:
        additionalProperties:
          type: string
        type: object
      status:
        type: string
      uploadURL:
        type: string
    type: object
  responses.ErrorResponse:
    properties:
      code:
        type: string
      description:
        type: string
      status:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: The official UHRP Storage Server implementation in Go, allowing anyone
    to host their own public file CDN.
  title: UHRP Storage Server API
  version: "1.0"
paths:
  /find:
    get:
      consumes:
      - application/json
      description: Find specific UHRP file advertisement.
      parameters:
      - description: UHRP URL of the file to find
        in: query
        name: uhrpUrl
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.findResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
      summary: Find file metadata
  /list:
    get:
      consumes:
      - application/json
      description: Retrieve a list of all currently active (non-expired) UHRP advertisements
        created by the authenticated user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.listResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
      summary: List user's active file uploads
  /put:
    put:
      consumes:
      - application/octet-stream
      description: Upload a file's binary content using a pre-signed URL generated
        by the /upload endpoint.
      parameters:
      - description: Uploader's identity key
        in: query
        name: uploader
        required: true
        type: string
      - description: Unique object identifier
        in: query
        name: objectID
        required: true
        type: string
      - description: Expected file size in bytes
        in: query
        name: fileSize
        required: true
        type: string
      - description: HMAC expiry timestamp
        in: query
        name: expiry
        required: true
        type: string
      - description: HMAC signature validating the upload request
        in: query
        name: hmac
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Success response
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
      summary: Upload a file
  /quote:
    post:
      consumes:
      - application/json
      description: Get a price quote in satoshis for hosting a file of a specific
        size for a specific duration.
      parameters:
      - description: File size and retention period details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.quoteRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.quoteResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
      summary: Calculate storage price
  /renew:
    post:
      consumes:
      - application/json
      description: Extend the storage time for an existing UHRP file advertisement.
      parameters:
      - description: UHRP URL and additional minutes to host
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.renewRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.renewResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
      summary: Renew an active file
  /upload:
    post:
      consumes:
      - application/json
      description: Get a pre-signed URL and payment details to upload a file to the
        UHRP storage server.
      parameters:
      - description: File size and desired retention period
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.uploadRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.uploadResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/responses.ErrorResponse'
      summary: Request an upload URL
securityDefinitions:
  AuthfetchIdentity:
    description: Authentication via go-bsv-middleware using BRC-43 Authfetch.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
